<html lang="en">

</head>
<body>
  <script nonce="correct-nonce">
    // Trusted by nonce. strict-dynamic propagates trust: the script this creates is allowed,
    // and that script in turn creates another script which should also be allowed.
    var s = document.createElement('script');
    s.src = '/csp/serve/305/chainjs';
    document.head.appendChild(s);
  </script>
</body>
